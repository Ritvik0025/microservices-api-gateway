spring:
  application:
    name: api-gateway
  
  # Cloud Gateway Configuration
  cloud:
    gateway:
      routes:
        # Route 1: User Service
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/users/**
          filters:
            - StripPrefix=1
            - name: CircuitBreaker
              args:
                name: userServiceCB
                fallbackUri: forward:/fallback/user-service
        
        # Route 2: Order Service
        - id: order-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/orders/**
          filters:
            - StripPrefix=1
            - name: CircuitBreaker
              args:
                name: orderServiceCB
                fallbackUri: forward:/fallback/order-service
        
        # Route 3: Product Service
        - id: product-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/products/**
          filters:
            - StripPrefix=1
            - name: CircuitBreaker
              args:
                name: productServiceCB
                fallbackUri: forward:/fallback/product-service

server:
  port: 8080

# Actuator Configuration for Health & Metrics
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info,circuitbreakers
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      simple:
        enabled: true

# Resilience4j Configuration
resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 2000
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: 2000
    instances:
      userServiceCB:
        baseConfig: default
      orderServiceCB:
        baseConfig: default
      productServiceCB:
        baseConfig: default

logging:
  level:
    root: INFO
    com.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG
